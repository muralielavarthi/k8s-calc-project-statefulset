apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-statefulset
  namespace: calc-namespace
  labels:
    app: mysql
    project: calc
    division: finance
spec:
  selector:
    matchLabels:
      app: mysql
      project: calc
      division: finance
  serviceName: "headless-service"
  replicas: 2
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: mysql
        project: calc
        division: finance
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mysql
          image: muralielavarthi/mysql:2.0.0
          envFrom: # dynamic updates will not be reflected in running pods.
            - configMapRef:
                name: database-config
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates: # pvc template.
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "mysql-storage"
        resources:
          requests:
            storage: 1Gi
